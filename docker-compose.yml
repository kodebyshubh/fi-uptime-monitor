services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - db-data:/data
    environment:
      - CHECK_INTERVAL_SECONDS=30

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db-data:
